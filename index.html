<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>HelloReady · Wedding Phrase Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light only;
    --ivory:#faf4ea; --paper:#fffdf8; --ink:#2b2018;
    --wine:#8c2f33; --wine-deep:#672228;
    --gold:#b08544; --gold-soft:#c9a96a;
    --line:#e7dcc8; --shadow:rgba(80,40,20,.12);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
    --fs:1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html{scroll-behavior:smooth;background:var(--ivory)}
  body{
    font-family:"Noto Sans TC",sans-serif; color:var(--ink); line-height:1.5;
    max-width:560px; margin:0 auto; min-height:100vh;
    padding-bottom:calc(70px + var(--safe-bot));
    background:var(--ivory);
  }
  body::before{content:"";position:fixed;inset:0;background:var(--ivory);z-index:-1}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{transition:none!important;animation:none!important} }

  .topbar{position:sticky;top:0;z-index:40;background:rgba(250,244,234,.94);backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);padding-top:var(--safe-top)}
  .appbar{display:flex;align-items:center;gap:10px;height:60px;padding:0 14px}
  .appbar .brand{display:flex;align-items:baseline;gap:8px;min-width:0;flex:1}
  .appbar .brand h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:19px;color:var(--ink);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{flex:0 0 auto;width:44px;height:44px;border-radius:10px;border:1.5px solid var(--gold-soft);background:var(--paper);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--wine)}
  .iconbtn svg{width:20px;height:20px;fill:var(--wine)}
  .iconbtn:active{transform:scale(.94)}
  .appbar-actions{display:flex;align-items:center;gap:10px}
  .edit-toggle-top{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--wine);background:var(--paper);color:var(--wine);font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;padding:0 14px;border-radius:10px;cursor:pointer;height:44px;transition:.16s}
  .edit-toggle-top svg{width:18px;height:18px;fill:currentColor}
  .edit-toggle-top.on{background:var(--wine);color:#fff;border-color:var(--wine)}
  .edit-toggle-top:active{transform:scale(.97)}

  .chipbar{display:flex;gap:8px;overflow-x:auto;padding:16px 14px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .chipbar::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;min-height:38px;display:flex;align-items:center;border:1.5px solid var(--gold-soft);background:var(--paper);color:#8a6f48;font-family:"Noto Sans TC",sans-serif;font-size:14px;font-weight:500;padding:6px 15px;border-radius:30px;cursor:pointer;white-space:nowrap;transition:.16s}
  .chip:active{transform:scale(.96)}
  .chip.active{background:var(--wine);border-color:var(--wine);color:#fff;box-shadow:0 2px 8px rgba(140,47,51,.25)}

  .intro{text-align:center;padding:16px 24px 6px}
  .intro p{font-size:13.5px;color:#7a6b58;max-width:340px;margin:0 auto;line-height:1.55}
  .intro .em{color:var(--wine);font-weight:500}

  section{padding:4px 14px 2px;scroll-margin-top:118px}
  #block-key{scroll-margin-top:118px}
  .sec-title{font-size:calc(19px * var(--fs));font-weight:700;color:var(--wine-deep);margin:24px 4px 14px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .sec-title .sub2{font-weight:500;font-size:calc(14px * var(--fs));color:var(--gold)}
  .sec-title .sechead-actions{margin-left:auto;display:none;gap:6px;align-self:center}
  body.editing .sec-title .sechead-actions{display:flex}
  .sec-sub{font-size:12.5px;color:#8a7a66;margin:0 4px 10px}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:11px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 1px 3px var(--shadow);transition:transform .12s, box-shadow .18s, border-color .18s;position:relative;overflow:hidden}
  .card:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  body.editing .card{cursor:default}
  .card:active{transform:scale(.985)}
  .card.speaking{border-color:var(--gold);box-shadow:0 4px 18px rgba(176,133,68,.32)}
  .card.speaking::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gold)}
  .card .txt{flex:1;min-width:0}

  .line-native{font-size:calc(17px * var(--fs));font-weight:700;color:var(--ink);line-height:1.4}
  .line-target{font-size:calc(22px * var(--fs));font-weight:600;color:var(--wine);margin-top:9px;line-height:1.32}
  .line-phonetic{font-size:calc(13px * var(--fs));color:#847b66;margin-top:9px;line-height:1.3}
  .lang-zh{font-family:"Noto Serif TC",serif}
  .lang-en{font-family:"Cormorant Garamond",serif}
  .lang-pinyin{font-family:"Noto Sans TC",system-ui,sans-serif;letter-spacing:.4px}
  .lang-zhsans{font-family:"Noto Sans TC",sans-serif;letter-spacing:1px}

  .speaker{flex-shrink:0;width:50px;height:50px;border-radius:50%;background:var(--ivory);border:1.5px solid var(--gold-soft);display:flex;align-items:center;justify-content:center;transition:.18s}
  .card.speaking .speaker{background:var(--gold);border-color:var(--gold);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(176,133,68,.45)}50%{box-shadow:0 0 0 7px rgba(176,133,68,0)}}
  .speaker svg{width:23px;height:23px;fill:var(--gold);transition:.18s}
  .card.speaking .speaker svg{fill:#fff}

  .row-actions{flex-shrink:0;display:none;gap:6px;align-items:center}
  body.editing .row-actions{display:flex}
  body.editing .speaker{display:none}
  .icon-btn{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--line);background:var(--ivory);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .icon-btn svg{width:19px;height:19px;fill:#7a6b58}
  .icon-btn.del{border-color:#e6c4c4;background:#fdf1f1}
  .icon-btn.del svg{fill:var(--wine)}
  .icon-btn:active{transform:scale(.92)}

  .editform{flex:1;display:flex;flex-direction:column;gap:8px}
  .editform label{font-size:11px;color:#9a8a76;margin-bottom:-4px}
  .editform input{font-family:"Noto Sans TC",sans-serif;font-size:16px;color:var(--ink);border:1.5px solid var(--gold-soft);border-radius:10px;padding:11px 12px;width:100%;background:#fff}
  .editform input.in-target{color:var(--wine)}
  .editform input.in-ph{font-size:14px;color:#8a7a66}
  .editform input:focus{outline:none;border-color:var(--wine)}
  .editform select{font-family:"Noto Sans TC",sans-serif;font-size:15px;color:var(--ink);border:1.5px solid var(--gold-soft);border-radius:10px;padding:11px 38px 11px 12px;width:100%;background-color:#fff;background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'12'%20height%3D'12'%20viewBox%3D'0%200%2012%2012'%3E%3Cpath%20d%3D'M3%204.5l3%203%203-3'%20fill%3D'none'%20stroke%3D'%23b08544'%20stroke-width%3D'1.6'%20stroke-linecap%3D'round'%20stroke-linejoin%3D'round'%2F%3E%3C%2Fsvg%3E");background-repeat:no-repeat;background-position:right 14px center;background-size:12px;-webkit-appearance:none;-moz-appearance:none;appearance:none;min-height:46px}
  .editform select:focus{outline:none;border-color:var(--wine)}
  .form-btns{display:flex;gap:8px;margin-top:2px}
  .btn{font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:500;padding:11px 20px;border-radius:24px;cursor:pointer;border:1.5px solid transparent;transition:.15s;min-height:44px}
  .btn-save{background:var(--wine);color:#fff}
  .btn-save:active{background:var(--wine-deep)}
  .btn-cancel{background:var(--paper);color:#7a6b58;border-color:var(--line)}
  .translate-btn{align-self:flex-start;border:1.5px solid var(--gold);background:#fff7ec;color:#9a6b1f;font-family:"Noto Sans TC",sans-serif;font-size:13.5px;font-weight:600;padding:0 15px;border-radius:10px;cursor:pointer;min-height:44px}
  .translate-btn:disabled{opacity:.55}
  .translate-btn:active{transform:scale(.97)}
  .tr-status{font-size:11.5px;color:#8a7257;margin:-2px 2px 0;min-height:14px;line-height:1.4}

  .add-row{display:none;width:100%;border:1.5px dashed var(--gold-soft);background:transparent;color:var(--gold);font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:500;padding:0 14px;border-radius:14px;cursor:pointer;margin-bottom:11px;min-height:44px}
  .add-row:active{background:#fff7ec}
  body.editing .add-row{display:block}

  .key-wrap{margin:8px 14px 4px;background:linear-gradient(155deg,#fff7ec,#fdeede);border:1.5px solid var(--gold-soft);border-radius:22px;padding:16px 14px 14px;box-shadow:0 6px 22px rgba(140,47,51,.10)}
  .key-wrap .badge{display:inline-block;background:var(--wine);color:#fff;font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;letter-spacing:1px}
  .key-wrap h2{font-family:"Noto Serif TC",serif;font-size:calc(18px * var(--fs));color:var(--wine-deep);margin:8px 2px 2px}
  .key-wrap .note{font-size:12.5px;color:#8a7257;margin:0 2px 12px}
  .key-wrap .card{background:#fffdfa}

  .footer-tools{display:none;text-align:center;padding:22px 14px 0}
  body.editing .footer-tools{display:block}
  .add-section-btn{border:1.5px dashed var(--wine);background:transparent;color:var(--wine);font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:500;padding:0 24px;border-radius:14px;cursor:pointer;width:100%;min-height:44px}

  footer{text-align:center;font-size:11px;color:#b3a690;padding:26px 24px 18px;font-family:"Cormorant Garamond",serif;font-style:italic}
  .footer-meta{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;font-style:normal;font-family:"Noto Sans TC",sans-serif;font-size:11px;color:#b3a690}
  .footer-report-btn{background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:#b3a690;transition:color .15s;padding:4px;flex-shrink:0}
  .footer-report-btn:hover,.footer-report-btn:active{color:var(--wine)}
  .footer-report-btn svg{width:15px;height:15px;fill:currentColor}
  .editform textarea{font-family:"Noto Sans TC",sans-serif;font-size:15px;color:var(--ink);border:1.5px solid var(--gold-soft);border-radius:10px;padding:11px 12px;width:100%;background:#fff;resize:vertical;min-height:90px}
  .editform textarea:focus{outline:none;border-color:var(--wine)}
  #contactStatus{font-size:12px;color:#8a7257;margin-top:4px;min-height:16px;text-align:center}
  .warnbar{display:none;background:var(--wine);color:#fff;font-size:12.5px;text-align:center;padding:10px 16px;line-height:1.4}

  .confirm-box{flex:1;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .confirm-box .ask{font-size:14px;color:var(--wine-deep);font-weight:500}

  .sheet-overlay{position:fixed;inset:0;background:rgba(43,32,24,.4);opacity:0;pointer-events:none;transition:opacity .22s;z-index:50}
  .sheet-overlay.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;max-width:560px;margin:0 auto;background:var(--paper);border-radius:24px 24px 0 0;box-shadow:0 -10px 40px rgba(80,40,20,.25);padding:8px 20px calc(24px + var(--safe-bot));transform:translateY(105%);transition:transform .26s cubic-bezier(.2,.8,.2,1);max-height:86vh;overflow-y:auto}
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:42px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 14px}
  .sheet h3{font-family:"Noto Serif TC",serif;font-size:18px;color:var(--wine-deep);margin-bottom:4px}
  .sheet .grp{margin-top:18px}
  .sheet .grp-label{font-size:13px;font-weight:700;color:#8a7257;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .sheet select{width:100%;font-family:"Noto Sans TC",sans-serif;font-size:15px;color:var(--ink);background-color:var(--ivory);background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'12'%20height%3D'12'%20viewBox%3D'0%200%2012%2012'%3E%3Cpath%20d%3D'M3%204.5l3%203%203-3'%20fill%3D'none'%20stroke%3D'%23b08544'%20stroke-width%3D'1.6'%20stroke-linecap%3D'round'%20stroke-linejoin%3D'round'%2F%3E%3C%2Fsvg%3E");background-repeat:no-repeat;background-position:right 16px center;background-size:12px;-webkit-appearance:none;-moz-appearance:none;appearance:none;border:1.5px solid var(--gold-soft);border-radius:14px;padding:13px 40px 13px 14px;min-height:48px}
  .sheet select:focus{outline:none;border-color:var(--wine)}
  .sheet input{width:100%;font-family:"Noto Sans TC",sans-serif;font-size:15px;color:var(--ink);background:var(--ivory);border:1.5px solid var(--gold-soft);border-radius:14px;padding:13px 14px;min-height:48px}
  .sheet input:focus{outline:none;border-color:var(--wine)}
  .seg{display:flex;gap:8px}
  .seg button,.sheet-btn{flex:1;min-height:48px;border:1.5px solid var(--gold-soft);background:var(--ivory);color:var(--ink);font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:500;border-radius:14px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .seg button.active{background:var(--wine);border-color:var(--wine);color:#fff}
  .fs-seg button{font-weight:700}
  .fs-seg button[data-fs="0.9"]{font-size:13px}
  .fs-seg button[data-fs="1"]{font-size:15px}
  .fs-seg button[data-fs="1.18"]{font-size:17px}
  .fs-seg button[data-fs="1.4"]{font-size:19px}
  .preview-btn{flex:0 0 auto;padding:0 18px;color:var(--gold);min-width:96px}
  .voice-row{display:flex;gap:8px;align-items:stretch}
  .voice-row select{flex:1}
  .reset-link{display:block;width:100%;text-align:center;background:none;border:none;color:#b3a690;font-size:13px;text-decoration:underline;cursor:pointer;padding:14px 8px 2px;min-height:44px}
  .refresh-link{display:block;width:100%;text-align:center;background:none;border:none;color:var(--wine);font-size:12.5px;text-decoration:underline;cursor:pointer;padding:8px;min-height:40px}
  .sheet .tip{font-size:11.5px;color:#a89a84;margin-top:7px;line-height:1.45}

  .auto-tag{display:none;margin-top:6px;background:#f3e7cf;color:#9a6b1f;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.5px}
  body.editing .auto-tag{display:inline-block}

  .modal-overlay{position:fixed;inset:0;background:rgba(43,32,24,.45);z-index:70;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .22s}
  #contactModal{z-index:110}
  .modal-overlay.open{opacity:1;pointer-events:auto}
  .modal{background:var(--paper);border-radius:20px;padding:22px 20px 20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(80,40,20,.28);transform:translateY(20px);transition:transform .22s cubic-bezier(.2,.8,.2,1)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .modal-header h3{font-family:"Noto Serif TC",serif;font-size:18px;color:var(--wine-deep);font-weight:700}
  .modal-close{width:32px;height:32px;border:none;background:none;cursor:pointer;color:#9a8a76;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:8px}
  .modal-close:active{background:var(--ivory)}

  .landing{position:fixed;inset:0;z-index:100;background:radial-gradient(circle at 50% 32%, #fff7ec, var(--ivory));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;transition:opacity .55s ease, visibility .55s}
  .landing.hide{opacity:0;visibility:hidden;pointer-events:none}
  .landing .art{width:144px;height:144px;margin-bottom:2px}
  .landing h1{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:38px;color:var(--ink);letter-spacing:.5px;margin-top:6px}
  .landing .tag{font-family:"Noto Serif TC",serif;font-size:17px;color:#6d5c46;margin-top:18px;letter-spacing:2px;max-width:300px}
  .landing .divider{width:54px;height:2px;background:var(--gold);opacity:.6;margin:24px auto 4px}
  .landing-options{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:26px;width:100%;max-width:340px}
  .landing .enter{width:100%;border:none;background:var(--wine);color:#fff;font-family:"Noto Sans TC",sans-serif;font-size:16px;font-weight:600;padding:16px 28px;border-radius:14px;cursor:pointer;box-shadow:0 8px 22px rgba(140,47,51,.3);min-height:56px}
  .landing .enter:active{transform:scale(.97)}
  .landing .enter-secondary{background:none;border:none;color:var(--wine);font-family:"Noto Sans TC",sans-serif;font-size:14px;text-decoration:underline;cursor:pointer;padding:8px 12px;min-height:44px}
  .landing-globe{position:absolute;top:calc(16px + var(--safe-top));right:16px;min-width:60px;height:40px;padding:0 12px;border-radius:20px;border:1.5px solid var(--gold-soft);background:var(--paper);color:var(--wine);font-family:"Noto Sans TC",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .landing-globe svg{width:16px;height:16px;fill:var(--wine)}
  .landing-globe:active{transform:scale(.96)}
  .landing-footer{position:absolute;bottom:calc(16px + var(--safe-bot));left:0;right:0;display:flex;align-items:center;justify-content:center;gap:7px;font-family:"Noto Sans TC",sans-serif;font-size:11px;color:#b3a690}
</style>
</head>
<body>

<div class="landing" id="landing">
  <button class="landing-globe" id="landingGlobe" aria-label="Language">中 / EN</button>
  <svg class="art" viewBox="0 0 120 120" aria-hidden="true">
    <g fill="none" stroke-width="4">
      <circle cx="49" cy="76" r="23" stroke="#c9a96a"/>
      <circle cx="71" cy="76" r="23" stroke="#b08544"/>
    </g>
    <path d="M60 28 l3.4 8.6 8.6 3.4 -8.6 3.4 -3.4 8.6 -3.4 -8.6 -8.6 -3.4 8.6 -3.4 z" fill="#b08544"/>
    <path d="M90 48 l2.2 5.6 5.6 2.2 -5.6 2.2 -2.2 5.6 -2.2 -5.6 -5.6 -2.2 5.6 -2.2 z" fill="#c9a96a"/>
  </svg>
  <h1>HelloReady</h1>
  <div class="tag" id="landingTag"></div>
  <div class="divider"></div>
  <div class="landing-options" id="landingOptions"></div>
  <div class="landing-footer">
    <span>v0.0.2</span>
    <span>·</span>
    <span>Grace Hsieh</span>
    <button class="footer-report-btn" id="contactBtnLanding" aria-label="Report / Contact"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg></button>
  </div>
</div>

<div id="warnbar" class="warnbar"></div>

<div class="topbar">
  <div class="appbar">
    <button class="iconbtn" id="homeBtn" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <div class="brand"><h1 id="appTitle">HelloReady</h1></div>
    <div class="appbar-actions">

  const mem={};
  return {
    async load(k){ if(hasKV){try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){return null;}} try{return localStorage.getItem(k);}catch(e){return mem[k]||null;} },
    async save(k,v){ if(hasKV){try{await window.storage.set(k,v);}catch(e){}return;} try{localStorage.setItem(k,v);}catch(e){mem[k]=v;} },

})();

/* ---- speech + voices ---- */
let rate=0.85, voice=null, selectedVoiceName=null, useNeural=false, currentAudio=null, speakingCard=null;
const synth=window.speechSynthesis;
function voiceRank(v){
  const n=v.name||''; let r=0;
  if(/siri/i.test(n))r+=6;
  if(/premium|enhanced|neural|natural/i.test(n))r+=5;
  if(/google/i.test(n))r+=3;
  if(/samantha|ava|allison|aaron|nicky|tom|daniel|karen|moira|serena|evan|mei-?jia|sin-?ji|ya-?ting|tian-?tian|li-?mu/i.test(n))r+=2;
  const lang=(v.lang||'').toLowerCase();
  if(DATA.targetLang==='zh'){ if(lang.indexOf('zh-tw')===0||lang==='zh-hant')r+=2; else if(lang.indexOf('zh-hk')===0)r+=1; else if(lang.indexOf('zh')===0)r+=1; }
  else { if(/en[-_]us/i.test(v.lang))r+=1; }
  return r;
}
function tgtVoices(){if(!synth)return [];const pre=DATA.targetLang;return synth.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().indexOf(pre)===0);}
function bestVoice(){const vs=tgtVoices().slice().sort((a,b)=>voiceRank(b)-voiceRank(a));return vs[0]||(synth?synth.getVoices()[0]:null)||null;}
function resolveVoice(){let v=null;if(selectedVoiceName)v=tgtVoices().find(x=>x.name===selectedVoiceName)||(synth?synth.getVoices().find(x=>x.name===selectedVoiceName):null);voice=v||bestVoice();}
function populateVoices(){if(!synth)return;const sel=document.getElementById('voiceSelect');if(!sel)return;const vs=tgtVoices().slice().sort((a,b)=>voiceRank(b)-voiceRank(a));if(vs.length===0){sel.innerHTML='';return;}sel.innerHTML='';vs.forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=(voiceRank(v)>=5?'⭐ ':'')+v.name+'  ('+v.lang+')';sel.appendChild(o);});resolveVoice();if(voice)sel.value=voice.name;}
function stopSpeaking(){if(synth)synth.cancel();if(currentAudio){try{currentAudio.pause();}catch(e){}currentAudio=null;}if(speakingCard){speakingCard.classList.remove('speaking');speakingCard=null;}}
function speakWeb(text,card){
  if(!synth||!text)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=(voice&&voice.lang)||(DATA.targetLang==='zh'?'zh-TW':DATA.targetLang+'-US');
  u.rate=rate;u.pitch=1;if(voice)u.voice=voice;
  if(card){card.classList.add('speaking');speakingCard=card;u.onend=()=>{card.classList.remove('speaking');if(speakingCard===card)speakingCard=null;};u.onerror=()=>{card.classList.remove('speaking');};}
  synth.speak(u);
}
async function speakNeural(text,card){
  try{
    if(card){card.classList.add('speaking');speakingCard=card;}
    const opts = DATA.targetLang==='zh' ? {voice:'Zhiyu',engine:'neural',language:'cmn-CN'} : {voice:'Joanna',engine:'neural',language:'en-US'};
    const audio = await puter.ai.txt2speech(text, opts);
    currentAudio=audio;
    audio.onended=()=>{if(card)card.classList.remove('speaking');if(speakingCard===card)speakingCard=null;};
    audio.onerror=()=>{if(card)card.classList.remove('speaking');};
    audio.play();
  }catch(e){ if(card)card.classList.remove('speaking'); speakWeb(text,card); }
}
function speak(text,card){
  if(!text)return;
  stopSpeaking();
  if(useNeural && rate>=0.85 && typeof puter!=='undefined' && puter.ai && puter.ai.txt2speech){ speakNeural(text,card); return; }
  speakWeb(text,card);
}

/* ---- translation ---- */
const LANGMAP={zh:'zh-CN',en:'en',ko:'ko',ja:'ja',es:'es',fr:'fr',de:'de'};
function langName(code){return ({zh:'Chinese',en:'English',ko:'Korean',ja:'Japanese',es:'Spanish',fr:'French',de:'German'})[code]||code;}
const THEME_PROMPTS={
  wedding:'You translate short phrases for a wedding phrase card spoken warmly and politely to in-laws.',
  general:'You translate short conversational phrases for a phrase card.',
};
function themeContext(){const theme=DATA.theme||'general';return THEME_PROMPTS[theme]||THEME_PROMPTS.general;}
async function translate(text){
  const from=DATA.nativeLang, to=DATA.targetLang;
  const key=geminiKey||DEFAULT_GKEY;
  if(key){
    try{ return await translateGemini(text,from,to,key); }
    catch(e){ return await translateMyMemory(text,from,to); }
  }
  return await translateMyMemory(text,from,to);
}
async function translateGemini(text,from,to,key){
  const model='gemini-2.5-flash-lite';
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+encodeURIComponent(key);
  let phoneticInstruction;
  if(to==='zh'){ phoneticInstruction='Use Traditional Chinese characters in the translation. Also write the Hanyu Pinyin of that Chinese WITH tone marks (field "phonetic").'; }
  else { phoneticInstruction='Also write a phonetic approximation of that '+langName(to)+' pronunciation using '+langName(from)+' characters (field "phonetic"), so a '+langName(from)+' speaker can read it aloud.'; }
  const prompt=themeContext()+' '
    +'Translate this '+langName(from)+' into natural, warm, polite '+langName(to)+'. '
    +phoneticInstruction+' '
    +'Also translate your '+langName(to)+' translation literally back into '+langName(from)+' (field "back") so the user can check the meaning. '
    +'Reply with ONLY compact JSON, no markdown: {"translation":"...","phonetic":"...","back":"..."}\n\nText: '+text;
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
  if(!r.ok)throw new Error('gemini '+r.status);
  const data=await r.json();
  let tx=((((data.candidates||[])[0]||{}).content||{}).parts||[])[0];
  tx=(tx&&tx.text)||''; tx=tx.replace(/```json|```/g,'').trim();
  const obj=JSON.parse(tx);
  return {translation:obj.translation||'',phonetic:obj.phonetic||'',back:obj.back||'',note:''};
}
async function translateMyMemory(text,from,to){
  const lp=(LANGMAP[from]||from)+'|'+(LANGMAP[to]||to);
  const r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair='+encodeURIComponent(lp));
  if(!r.ok)throw new Error('mymemory '+r.status);
  const data=await r.json();
  const tr=(data.responseData&&data.responseData.translatedText)||'';
  if(!tr)throw new Error('empty');
  let back='';
  try{
    const lp2=(LANGMAP[to]||to)+'|'+(LANGMAP[from]||from);
    const r2=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(tr)+'&langpair='+encodeURIComponent(lp2));
    if(r2.ok){const d2=await r2.json();back=(d2.responseData&&d2.responseData.translatedText)||'';}
  }catch(e){}
  return {translation:tr,phonetic:'',back:back,note:t('noPh')};
}

function runTranslate(tb,statusEl,getNat,setTgt,setPh,onDone){
  const v=getNat().trim();
  if(!v){statusEl.textContent=t('needInput');return;}
  const label=tb.textContent;tb.disabled=true;tb.textContent=t('translating');statusEl.textContent='';
  translate(v).then(res=>{
    if(res.translation)setTgt(res.translation);
    if(res.phonetic)setPh(res.phonetic);
    const safeBack=res.back?escHtml(res.back):'';
    let msg=safeBack?(t('backCheck')+'「'+safeBack+'」<br>'+t('sameOk')):'';

async function loadPack(id){
  currentPackId=id;
  DATA=await loadPackData(id);
  const p=PACKS[id];
  if(!DATA.nativeLang)DATA.nativeLang=p.nativeLang;
  if(!DATA.targetLang)DATA.targetLang=p.targetLang;

async function loadPackData(id){
  if(id==='en'){
    const v=await Store.load(ENKEY);
    if(v){try{const p=JSON.parse(v);if(p&&p.key&&p.categories)return p;}catch(e){}}
    return seed('en');
  }
  let loaded=null;
  const v2=await Store.load(PKEY);
  if(v2){try{const p=JSON.parse(v2);if(p&&p.key&&p.categories)loaded=p;}catch(e){}}
  if(!loaded){const v1=await Store.load(DKEY);if(v1){try{const old=JSON.parse(v1);if(old&&old.key&&old.sections)loaded=migrateLegacy(old);}catch(e){}}}
  if(!loaded)loaded=seed('zh');
  if(!loaded.nativeLang)loaded.nativeLang='zh';
  if(!loaded.targetLang)loaded.targetLang='en';
  const sd=seed('zh');const phMap={};
  sd.key.forEach(i=>phMap[i.id]=i.phonetic.en);
  sd.categories.forEach(c=>c.phrases.forEach(i=>phMap[i.id]=i.phonetic.en));
  const fill=(p)=>{const cur=(p.phonetic&&p.phonetic.en)||'';if(!cur&&phMap[p.id]){if(!p.phonetic)p.phonetic={};p.phonetic.en=phMap[p.id];}};
  loaded.key.forEach(fill);loaded.categories.forEach(c=>c.phrases.forEach(fill));
  const migrated=await Store.load(MKEY);
  if(!migrated){
    const idx=loaded.categories.findIndex(c=>(c.title&&(c.title.en==='Just the basics'||c.title.zh==='簡單用語')));
    if(idx>0){const moved=loaded.categories.splice(idx,1)[0];loaded.categories.unshift(moved);}
    await Store.save(MKEY,'1');
  }
  const phdone=await Store.load(PHV);
  if(!phdone){
    const corr={};const sd2=seed('zh');
    sd2.key.forEach(i=>corr[i.id]=i.phonetic.en);
    sd2.categories.forEach(c=>c.phrases.forEach(i=>corr[i.id]=i.phonetic.en));
    const fix=(p)=>{if(corr[p.id]!==undefined){if(!p.phonetic)p.phonetic={};p.phonetic.en=corr[p.id];}};
    loaded.key.forEach(fix);loaded.categories.forEach(c=>c.phrases.forEach(fix));
    await Store.save(PHV,'1');
  }
  return loaded;
}

document.querySelector('[data-add-key]').addEventListener('click',()=>openAddPopup('key'));
document.getElementById('addSectionBtn').addEventListener('click',async()=>{const cat=newCategory();DATA.categories.push(cat);secEditId=cat.id;await save();render();window.scrollTo(0,document.body.scrollHeight);});
document.getElementById('resetBtn').addEventListener('click',async()=>{if(confirm(t('resetConfirm'))){await Store.clear(packStorageKey(currentPackId));DATA=seed(currentPackId);editingId=null;confirmId=null;secEditId=null;render();closeSheet();}});

/* ---- init ---- */
(async function(){
  uiLang=(await Store.load(UIKEY))||detectLang();
  document.documentElement.lang=(uiLang==='zh'?'zh-Hant':'en');
  const fsv=await Store.load(FKEY);applyFontScale(fsv||'1');
  const gk=await Store.load(TKEY);if(gk){geminiKey=gk;const gi=document.getElementById('gkeyInput');if(gi)gi.value=gk;}
  const nv=await Store.load(NEURALKEY);if(nv)enableNeural(true);
  applyStrings();
  syncEditBtn();
  const last=await Store.load(LASTKEY);
  if(last&&PACKS[last]){ await loadPack(last); landing.classList.add('hide'); applyStrings(); render(); }
  else { showLanding(); }
})();
</script>
</body>
</html>
